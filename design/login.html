<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Artisanal Curator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#9A5038', // Adjusted slightly to match the specific login screen hue
                            light: '#B26145',
                        },
                        stone: {
                            50: '#FDFBF8',  // Very light cream (right side)
                            200: '#E6E1D6', // Deeper beige (left side)
                            300: '#D4CFC4', // Borders
                            400: '#A39E93', // Placeholders
                            600: '#6B665E', // Subtext
                            800: '#3D3935', // Dark text
                            900: '#2A2623', // Headings
                        }
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .input-minimal {
            @apply w-full bg-transparent border-0 border-b border-stone-300 px-0 py-3 text-stone-800 font-serif focus:ring-0 focus:border-brand transition-colors duration-200 outline-none;
        }
        .input-minimal::placeholder {
            @apply text-stone-400 font-serif;
        }
    </style>
</head>
<body class="bg-stone-50 font-sans text-stone-800 antialiased h-screen overflow-hidden">

    <div class="flex h-full w-full">
        
        <!-- Left Panel: Branding & Imagery Area -->
        <div class="hidden lg:flex flex-col justify-between w-[45%] bg-stone-200 p-16 xl:p-24 relative">
            <!-- Logo -->
            <div class="text-3xl font-serif font-bold text-brand tracking-wide">
                The Artisanal Curator
            </div>

            <!-- Central Copy -->
            <div class="max-w-md">
                <h2 class="text-[1.75rem] leading-tight font-serif font-bold text-stone-800 mb-6">
                    Return to the<br>
                    hands that create.
                </h2>
                <p class="text-stone-600 font-serif text-lg leading-relaxed">
                    A curated sanctuary for master craftspeople and those who cherish the provenance of the handmade.
                </p>
            </div>

            <!-- Footer / Est -->
            <div class="flex items-center text-xs font-sans text-stone-500 uppercase tracking-[0.2em]">
                <div class="w-10 h-px bg-stone-400 mr-4"></div>
                EST. 2024
            </div>
        </div>

        <!-- Right Panel: Form Area -->
        <div class="w-full lg:w-[55%] flex items-center justify-center bg-stone-50 p-8 sm:p-16">
            <div class="w-full max-w-[420px]">
                
                <!-- Form Header -->
                <div class="mb-12">
                    <h1 class="text-4xl font-serif font-bold text-stone-900 mb-3">Welcome Back</h1>
                    <p class="text-stone-600 font-serif text-lg">Enter your details to access your studio.</p>
                </div>

                <form action="#" method="POST" class="space-y-8">
                    
                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block font-serif text-stone-800 text-lg mb-1">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="master@craftsman.studio" 
                            class="input-minimal"
                            required
                        >
                    </div>

                    <!-- Password Field -->
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label for="password" class="block font-serif text-stone-800 text-lg">Password</label>
                            <a href="#" class="text-stone-600 font-serif text-sm hover:text-brand transition-colors">Forgot?</a>
                        </div>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="••••••••" 
                                class="input-minimal pr-10"
                                required
                            >
                            <button type="button" class="absolute right-0 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Sign In Button -->
                    <button type="submit" class="w-full bg-brand text-white font-serif font-bold text-lg py-3.5 rounded flex justify-center items-center hover:bg-brand-light transition-colors duration-300 mt-2">
                        Sign In
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 ml-2">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                        </svg>
                    </button>

                </form>

                <!-- Divider -->
                <div class="flex items-center my-8">
                    <div class="flex-grow border-t border-stone-200"></div>
                    <span class="px-6 text-stone-400 font-serif text-sm">OR</span>
                    <div class="flex-grow border-t border-stone-200"></div>
                </div>

                <!-- Google Auth Button -->
                <button type="button" class="w-full bg-[#EFECE6] text-brand font-serif font-bold text-lg py-3.5 rounded flex justify-center items-center hover:bg-[#E6E1D6] transition-colors duration-300">
                    <div class="w-4 h-4 bg-[#E0D8CC] mr-3 rounded-sm"></div>
                    Continue with Google
                </button>

                <!-- Sign Up Link -->
                <div class="mt-12 text-center text-stone-600 font-serif">
                    New to the collection? 
                    <a href="#" class="font-bold text-brand hover:underline">Join the Registry</a>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
